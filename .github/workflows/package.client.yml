name: Package Client

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - "shared/**"
      - ".github/workflows/package.client.yml"
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: "latest"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/client
          tags: |
            type=sha,format=long
            type=ref,event=branch
            ${{ inputs.version != 'latest' && format('type=raw,value={0}', inputs.version) || '' }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/docker-image-client.tar

      - name: Upload Docker image artifact
        if: ${{ inputs.version != 'latest' && inputs.version != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-client-${{ inputs.version }}
          path: /tmp/docker-image-client.tar
